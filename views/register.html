<!DOCTYPE html><html lang="ar" dir="rtl"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>تسجيل حساب جديد | شغلاتي HOME</title>
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Almarai',sans-serif;background:#FBF8F2;color:#2B2620;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.card{background:#fff;border-radius:16px;padding:40px 32px;width:100%;max-width:420px;box-shadow:0 4px 24px rgba(43,38,32,.08)}
.logo{text-align:center;font-weight:800;font-size:1.4rem;margin-bottom:8px}.logo .g{color:#C99A3F}.logo .p{color:#DDA0A2}
h2{text-align:center;font-weight:800;font-size:1.1rem;margin-bottom:6px;color:#6E665C}
.sub{text-align:center;font-size:.82rem;color:#9E9589;margin-bottom:24px}
.fg{margin-bottom:14px}label{display:block;font-weight:700;font-size:.85rem;margin-bottom:5px}
input,select{width:100%;padding:12px 14px;border:1.5px solid rgba(201,154,63,.15);border-radius:8px;background:#FBF8F2;outline:none;font-size:.9rem;transition:border-color .2s;font-family:inherit}
input:focus,select:focus{border-color:#C99A3F}
.role-tabs{display:flex;gap:8px;margin-bottom:20px}
.role-tab{flex:1;padding:10px;border-radius:8px;text-align:center;font-weight:700;font-size:.85rem;cursor:pointer;border:1.5px solid rgba(201,154,63,.15);background:#FBF8F2;color:#6E665C;transition:all .2s}
.role-tab.active{background:linear-gradient(135deg,#C99A3F,#A87E2C);color:#fff;border-color:transparent}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#C99A3F,#A87E2C);color:#fff;border:none;border-radius:50px;font-weight:800;font-size:1rem;cursor:pointer;transition:opacity .2s;margin-top:8px}
.btn:hover{opacity:.9}.btn:disabled{opacity:.5}
.err{color:#E53E3E;font-size:.82rem;text-align:center;margin-top:12px;display:none}
.link{text-align:center;margin-top:20px;font-size:.85rem;color:#6E665C}.link a{color:#C99A3F;font-weight:700}
</style></head><body>
<div class="card">
  <div class="logo"><span class="g">شغلاتي</span> <span class="p">HOME</span></div>
  <h2>إنشاء حساب جديد</h2>
  <p class="sub">سجّل كعميل أو كتاجر لإنشاء متجرك</p>
  <div class="role-tabs">
    <div class="role-tab active" onclick="setRole('customer',this)">عميل</div>
    <div class="role-tab" onclick="setRole('vendor',this)">تاجر</div>
  </div>
  <div class="fg"><label>الاسم الكامل</label><input type="text" id="name" maxlength="100"></div>
  <div class="fg"><label>رقم الهاتف</label><input type="tel" id="phone" dir="ltr" style="text-align:right" maxlength="15"></div>
  <div class="fg"><label>كلمة المرور</label><input type="password" id="pass" maxlength="50" placeholder="6 أحرف على الأقل"></div>
  <button class="btn" id="regBtn" onclick="doRegister()">إنشاء حساب</button>
  <div class="err" id="err"></div>
  <div class="link">لديك حساب؟ <a href="/login">سجّل دخول</a></div>
  <div class="link"><a href="/">العودة للمتجر</a></div>
</div>
<script>
var selectedRole='customer';
function setRole(r,el){selectedRole=r;document.querySelectorAll('.role-tab').forEach(function(t){t.classList.remove('active')});el.classList.add('active')}
async function doRegister(){
  var btn=document.getElementById('regBtn'),err=document.getElementById('err');
  var name=document.getElementById('name').value.trim(),phone=document.getElementById('phone').value.trim(),pass=document.getElementById('pass').value;
  if(!name||!phone||!pass){err.textContent='جميع الحقول مطلوبة';err.style.display='block';return}
  if(pass.length<6){err.textContent='كلمة المرور يجب أن تكون 6 أحرف على الأقل';err.style.display='block';return}
  btn.disabled=true;err.style.display='none';
  try{
    var r=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({full_name:name,phone:phone,password:pass,role:selectedRole})});
    var d=await r.json();
    if(!r.ok){err.textContent=d.error;err.style.display='block';btn.disabled=false;return}
    localStorage.setItem('sh_token',d.token);localStorage.setItem('sh_user',JSON.stringify(d.user));
    if(selectedRole==='vendor')window.location.href='/vendor/';
    else window.location.href='/';
  }catch(e){err.textContent='خطأ في الاتصال';err.style.display='block';btn.disabled=false}
}
document.getElementById('pass').addEventListener('keydown',function(e){if(e.key==='Enter')doRegister()});
</script></body></html>
