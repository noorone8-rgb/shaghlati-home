<!DOCTYPE html><html lang="ar" dir="rtl"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>لوحة التاجر | شغلاتي HOME</title>
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Almarai',sans-serif;background:#F5F3EE;color:#2B2620}
.top{background:#2B2620;color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.top-logo{font-weight:800;font-size:1.1rem}.top-logo .g{color:#E3C78A}.top-logo .p{color:#F2C2C6}
.top-r{display:flex;align-items:center;gap:12px;font-size:.82rem}
.top-r a,.top-r button{color:rgba(255,255,255,.7);background:none;border:none;font-family:inherit;font-size:.82rem;cursor:pointer;transition:color .15s}
.top-r a:hover,.top-r button:hover{color:#fff}
.badge{background:#C99A3F;color:#fff;padding:2px 10px;border-radius:50px;font-size:.7rem;font-weight:700}
.layout{display:flex;min-height:calc(100vh - 48px)}
.sidebar{width:220px;background:#fff;border-left:1px solid rgba(201,154,63,.06);padding:16px 0;flex-shrink:0;position:sticky;top:48px;height:calc(100vh - 48px);overflow-y:auto}
.sb-item{display:block;padding:12px 20px;font-size:.88rem;font-weight:600;color:#6E665C;cursor:pointer;transition:all .15s;border-right:3px solid transparent}
.sb-item:hover{background:#FBF8F2;color:#2B2620}
.sb-item.active{color:#A87E2C;border-right-color:#C99A3F;background:rgba(201,154,63,.04);font-weight:800}
.main{flex:1;padding:24px;max-width:900px}
.page{display:none}.page.active{display:block}
h1{font-weight:800;font-size:1.3rem;margin-bottom:20px}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:24px}
.stat{background:#fff;padding:20px 16px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.stat-val{font-weight:800;font-size:1.5rem;color:#A87E2C}.stat-label{font-size:.78rem;color:#6E665C;margin-top:2px}
.progress-bar{height:6px;background:#eee;border-radius:3px;margin-top:6px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#C99A3F,#A87E2C);border-radius:3px;transition:width .3s}
.alert{padding:14px 16px;border-radius:8px;margin-bottom:16px;font-size:.85rem;font-weight:600}
.alert-warn{background:#FEF3C7;color:#92400E;border:1px solid #FDE68A}
.alert-info{background:#DBEAFE;color:#1E40AF;border:1px solid #BFDBFE}
.alert-ok{background:#D1FAE5;color:#065F46;border:1px solid #A7F3D0}
.tbl{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.tbl th{background:#FBF8F2;padding:10px 14px;font-size:.78rem;font-weight:700;text-align:start;color:#6E665C}
.tbl td{padding:10px 14px;font-size:.82rem;border-top:1px solid #f5f3ee}
.form-g{margin-bottom:14px}
.form-g label{display:block;font-weight:700;font-size:.82rem;margin-bottom:4px}
.form-g input,.form-g select,.form-g textarea{width:100%;padding:10px 12px;border:1.5px solid rgba(201,154,63,.12);border-radius:8px;background:#FBF8F2;outline:none;font-size:.88rem;font-family:inherit}
.form-g input:focus,.form-g select:focus,.form-g textarea:focus{border-color:#C99A3F}
.form-g textarea{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn{padding:12px 28px;border-radius:50px;font-weight:700;font-size:.88rem;cursor:pointer;transition:all .2s;border:none}
.btn-p{background:linear-gradient(135deg,#C99A3F,#A87E2C);color:#fff}
.btn-p:hover{opacity:.9}
.btn-o{border:1.5px solid #C99A3F;color:#A87E2C;background:transparent}
.btn-d{background:#FEE2E2;color:#E53E3E}
.btn-sm{padding:6px 14px;font-size:.78rem}
.upload-area{border:2px dashed rgba(201,154,63,.15);border-radius:8px;padding:20px;text-align:center;cursor:pointer;position:relative;font-size:.82rem;color:#6E665C}
.upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer}
.thumbs{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.thumb{width:60px;height:60px;border-radius:6px;overflow:hidden;position:relative}.thumb img{width:100%;height:100%;object-fit:cover}
.thumb .rm{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;font-size:.6rem;display:flex;align-items:center;justify-content:center;cursor:pointer}
.empty{text-align:center;padding:32px;color:#9E9589;font-size:.88rem}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:24px;width:90%;max-width:480px;max-height:85vh;overflow-y:auto}
.modal h3{font-weight:800;font-size:1.05rem;margin-bottom:16px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2B2620;color:#fff;padding:10px 24px;border-radius:50px;font-size:.82rem;font-weight:600;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:768px){
  .sidebar{display:none}.main{padding:16px}
  .mob-nav{display:flex;overflow-x:auto;gap:4px;padding:8px 12px;background:#fff;border-bottom:1px solid #f0f0f0;position:sticky;top:48px;z-index:40;scrollbar-width:none;-ms-overflow-style:none}
  .mob-nav::-webkit-scrollbar{display:none}
  .mob-nav span{white-space:nowrap;padding:8px 16px;border-radius:50px;font-size:.8rem;font-weight:600;color:#6E665C;cursor:pointer;background:#FBF8F2}
  .mob-nav span.active{background:#C99A3F;color:#fff}
  .stats{grid-template-columns:1fr 1fr}.form-row{grid-template-columns:1fr}
}
@media(min-width:769px){.mob-nav{display:none}}
</style></head><body>

<div class="top">
  <div class="top-logo"><span class="g">شغلاتي</span> <span class="p">HOME</span></div>
  <div class="top-r">
    <span id="storeName"></span>
    <span class="badge" id="planBadge"></span>
    <a href="/" target="_blank">المتجر</a>
    <button onclick="logout()">خروج</button>
  </div>
</div>

<div class="mob-nav" id="mobNav"></div>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="mainContent"></div>
</div>

<div class="toast" id="toast"></div>

<script>
var T=localStorage.getItem('sh_token'),U=JSON.parse(localStorage.getItem('sh_user')||'null');
if(!T||!U){window.location.href='/login';throw''}
var API='/api',V=null,SUB=null,PAGES=['dashboard','products','categories','orders','settings','subscription'];
var currentPage='dashboard';

function h(t){return{'Content-Type':'application/json','Authorization':'Bearer '+T}}
function hf(){return{'Authorization':'Bearer '+T}}
function toast(m){var e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(function(){e.classList.remove('show')},2500)}
function logout(){localStorage.removeItem('sh_token');localStorage.removeItem('sh_user');window.location.href='/login'}
function fmtP(n){return(parseInt(n)||0).toLocaleString('en')+' د.ع'}
function fmtDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('ar-IQ')}
function daysLeft(d){if(!d)return 0;return Math.max(0,Math.ceil((new Date(d)-new Date())/(86400000)))}

async function loadDashboard(){
  try{
    var r=await fetch(API+'/vendor/dashboard',{headers:hf()});
    var d=await r.json();
    V=d.vendor;SUB=d.subscription;
    if(!V){showCreateStore();return}
    document.getElementById('storeName').textContent=V.store_name;
    document.getElementById('planBadge').textContent=SUB?SUB.plan_name:'بدون اشتراك';
    renderSidebar();
    renderPage(currentPage);
  }catch(e){toast('خطأ في تحميل البيانات')}
}

function showCreateStore(){
  document.getElementById('sidebar').innerHTML='';
  document.getElementById('mobNav').innerHTML='';
  document.getElementById('mainContent').innerHTML=`
    <h1>مرحباً ${U.full_name}</h1>
    <div class="alert alert-info">لبدء البيع، أنشئ متجرك الآن</div>
    <div class="form-g"><label>اسم المتجر</label><input type="text" id="csName" maxlength="100"></div>
    <div class="form-g"><label>وصف المتجر</label><textarea id="csDesc" maxlength="500"></textarea></div>
    <div class="form-row">
      <div class="form-g"><label>نوع النشاط</label><select id="csType"><option value="إلكترونيات">إلكترونيات</option><option value="ملابس">ملابس</option><option value="أطعمة">أطعمة</option><option value="مستلزمات منزلية">مستلزمات منزلية</option><option value="خدمات">خدمات</option><option value="أخرى">أخرى</option></select></div>
      <div class="form-g"><label>واتساب</label><input type="tel" id="csWa" dir="ltr" style="text-align:right" maxlength="15"></div>
    </div>
    <div class="form-row">
      <div class="form-g"><label>اللون الأساسي</label><input type="color" id="csColor1" value="#C99A3F"></div>
      <div class="form-g"><label>اللون الثانوي</label><input type="color" id="csColor2" value="#2B2620"></div>
    </div>
    <button class="btn btn-p" onclick="createStore()">إنشاء المتجر</button>`;
}

async function createStore(){
  var name=document.getElementById('csName').value.trim();
  if(!name){toast('أدخل اسم المتجر');return}
  var fd=new FormData();
  fd.append('store_name',name);
  fd.append('store_desc',document.getElementById('csDesc').value.trim());
  fd.append('business_type',document.getElementById('csType').value);
  fd.append('whatsapp',document.getElementById('csWa').value.trim());
  fd.append('primary_color',document.getElementById('csColor1').value);
  fd.append('secondary_color',document.getElementById('csColor2').value);
  try{
    var r=await fetch(API+'/vendor/create-store',{method:'POST',headers:hf(),body:fd});
    var d=await r.json();
    if(!r.ok){toast(d.error);return}
    toast('تم إنشاء المتجر!');loadDashboard();
  }catch(e){toast('خطأ')}
}

function renderSidebar(){
  var items=[{id:'dashboard',label:'لوحة القيادة'},{id:'products',label:'المنتجات'},{id:'categories',label:'الأقسام'},{id:'orders',label:'الطلبات'},{id:'settings',label:'إعدادات المتجر'},{id:'subscription',label:'الاشتراك'}];
  var sbH='',mnH='';
  items.forEach(function(it){
    var ac=it.id===currentPage?' active':'';
    sbH+='<div class="sb-item'+ac+'" onclick="goPage(\''+it.id+'\')">'+it.label+'</div>';
    mnH+='<span class="'+ac.trim()+'" onclick="goPage(\''+it.id+'\')">'+it.label+'</span>';
  });
  document.getElementById('sidebar').innerHTML=sbH;
  document.getElementById('mobNav').innerHTML=mnH;
}

function goPage(p){currentPage=p;renderSidebar();renderPage(p)}

async function renderPage(p){
  var mc=document.getElementById('mainContent');
  if(p==='dashboard')await renderDashPage(mc);
  else if(p==='products')await renderProductsPage(mc);
  else if(p==='categories')await renderCategoriesPage(mc);
  else if(p==='orders')await renderOrdersPage(mc);
  else if(p==='settings')renderSettingsPage(mc);
  else if(p==='subscription')await renderSubPage(mc);
}

async function renderDashPage(mc){
  var r=await fetch(API+'/vendor/dashboard',{headers:hf()});var d=await r.json();
  V=d.vendor;SUB=d.subscription;
  var maxP=SUB?SUB.max_products:0,maxC=SUB?SUB.max_categories:0;
  var pPct=maxP===-1?10:Math.min(100,Math.round(d.productCount/maxP*100));
  var cPct=maxC===-1?10:Math.min(100,Math.round(d.categoryCount/maxC*100));
  var dl=SUB?daysLeft(SUB.expires_at):0;

  var html='<h1>لوحة القيادة</h1>';
  if(!SUB&&!d.pendingRequest)html+='<div class="alert alert-warn">لم تشترك بعد — <a href="#" onclick="goPage(\'subscription\');return false" style="color:#92400E;font-weight:800">اختر باقتك الآن</a></div>';
  if(d.pendingRequest)html+='<div class="alert alert-info">طلب اشتراك بانتظار المراجعة — الباقة: '+d.pendingRequest.plan_name+'</div>';
  if(SUB&&dl<=7&&dl>0)html+='<div class="alert alert-warn">متبقي '+dl+' يوم على انتهاء اشتراكك</div>';

  html+='<div class="stats">';
  html+='<div class="stat"><div class="stat-val">'+d.productCount+'</div><div class="stat-label">المنتجات'+(maxP!==-1?' / '+maxP:'')+'</div><div class="progress-bar"><div class="progress-fill" style="width:'+pPct+'%"></div></div></div>';
  html+='<div class="stat"><div class="stat-val">'+d.categoryCount+'</div><div class="stat-label">الأقسام'+(maxC!==-1?' / '+maxC:'')+'</div><div class="progress-bar"><div class="progress-fill" style="width:'+cPct+'%"></div></div></div>';
  html+='<div class="stat"><div class="stat-val">'+d.orderCount+'</div><div class="stat-label">الطلبات</div></div>';
  html+='<div class="stat"><div class="stat-val">'+dl+'</div><div class="stat-label">يوم متبقي</div></div>';
  html+='</div>';

  if(V.status==='active')html+='<div class="alert alert-ok">متجرك فعّال — <a href="/store/'+V.store_slug+'" target="_blank" style="color:#065F46;font-weight:800">عرض صفحة المتجر</a></div>';
  else if(V.status==='pending')html+='<div class="alert alert-info">بانتظار التفعيل</div>';
  else if(V.status==='expired')html+='<div class="alert alert-warn">اشتراكك منتهي — جدّد الآن</div>';

  mc.innerHTML=html;
}

async function renderProductsPage(mc){
  var r=await fetch(API+'/vendor/manage/products',{headers:hf()});var d=await r.json();
  var html='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><h1 style="margin:0">المنتجات</h1><button class="btn btn-p btn-sm" onclick="showAddProduct()">إضافة منتج</button></div>';
  if(!d.products.length){html+='<div class="empty">لا توجد منتجات — أضف أول منتج</div>';mc.innerHTML=html;return}
  html+='<table class="tbl"><thead><tr><th>المنتج</th><th>الرمز</th><th>السعر</th><th>القسم</th><th></th></tr></thead><tbody>';
  d.products.forEach(function(p){
    var img=p.images&&p.images.length?'<img src="'+p.images[0]+'" style="width:36px;height:36px;border-radius:6px;object-fit:cover;margin-left:8px;display:inline-block;vertical-align:middle">':'';
    html+='<tr><td>'+img+p.name+'</td><td style="font-size:.75rem;color:#6E665C">'+p.product_code+'</td><td>'+fmtP(p.price)+'</td><td>'+(p.category_name||'—')+'</td><td><button class="btn btn-d btn-sm" onclick="delProduct(\''+p.id+'\')">حذف</button></td></tr>';
  });
  html+='</tbody></table>';
  mc.innerHTML=html;
}

function showAddProduct(){
  fetch(API+'/vendor/manage/categories',{headers:hf()}).then(function(r){return r.json()}).then(function(d){
    var catOpts='<option value="">بدون قسم</option>';
    d.categories.forEach(function(c){catOpts+='<option value="'+c.id+'">'+c.name+'</option>'});
    var modal=document.createElement('div');modal.className='modal-bg open';modal.id='addProdModal';
    modal.innerHTML='<div class="modal"><h3>إضافة منتج</h3>'+
      '<div class="form-row"><div class="form-g"><label>اسم المنتج</label><input id="apName" maxlength="200"></div><div class="form-g"><label>رمز المنتج</label><input id="apCode" maxlength="30" dir="ltr" style="text-align:right" placeholder="تلقائي"></div></div>'+
      '<div class="form-row"><div class="form-g"><label>السعر (د.ع)</label><input type="number" id="apPrice" min="0"></div><div class="form-g"><label>السعر قبل الخصم</label><input type="number" id="apOld" min="0"></div></div>'+
      '<div class="form-g"><label>القسم</label><select id="apCat">'+catOpts+'</select></div>'+
      '<div class="form-g"><label>الوصف</label><textarea id="apDesc" maxlength="2000"></textarea></div>'+
      '<div class="form-g"><label>صور وفيديوهات</label><div class="upload-area">اضغط لرفع ملفات<input type="file" id="apMedia" multiple accept="image/*,video/*"></div></div>'+
      '<div style="display:flex;gap:8px;margin-top:16px"><button class="btn btn-p" onclick="submitProduct()">إضافة</button><button class="btn btn-o" onclick="document.getElementById(\'addProdModal\').remove()">إلغاء</button></div></div>';
    document.body.appendChild(modal);
    modal.addEventListener('click',function(e){if(e.target===modal)modal.remove()});
  });
}

async function submitProduct(){
  var fd=new FormData();
  fd.append('name',document.getElementById('apName').value.trim());
  fd.append('product_code',document.getElementById('apCode').value.trim());
  fd.append('price',document.getElementById('apPrice').value);
  fd.append('old_price',document.getElementById('apOld').value||'0');
  fd.append('category_id',document.getElementById('apCat').value);
  fd.append('description',document.getElementById('apDesc').value.trim());
  var files=document.getElementById('apMedia').files;
  for(var i=0;i<files.length;i++)fd.append('media',files[i]);
  try{
    var r=await fetch(API+'/vendor/manage/products',{method:'POST',headers:hf(),body:fd});
    var d=await r.json();
    if(!r.ok){toast(d.error);return}
    document.getElementById('addProdModal').remove();
    toast('تم إضافة المنتج');goPage('products');
  }catch(e){toast('خطأ')}
}

async function delProduct(id){
  if(!confirm('حذف هذا المنتج؟'))return;
  await fetch(API+'/vendor/manage/products/'+id,{method:'DELETE',headers:hf()});
  toast('تم الحذف');goPage('products');
}

async function renderCategoriesPage(mc){
  var r=await fetch(API+'/vendor/manage/categories',{headers:hf()});var d=await r.json();
  var html='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><h1 style="margin:0">الأقسام <span style="font-size:.8rem;color:#6E665C;font-weight:400">('+(d.categories.length)+(d.max!==-1?' / '+d.max:'')+')</span></h1></div>';
  html+='<div style="display:flex;gap:8px;margin-bottom:16px"><input id="newCatName" placeholder="اسم القسم الجديد" style="flex:1;padding:10px 12px;border:1.5px solid rgba(201,154,63,.12);border-radius:8px;outline:none;font-family:inherit;font-size:.88rem" maxlength="80"><button class="btn btn-p btn-sm" onclick="addCategory()">إضافة</button></div>';
  if(!d.categories.length){html+='<div class="empty">لا توجد أقسام</div>';}
  else{html+='<table class="tbl"><thead><tr><th>القسم</th><th></th></tr></thead><tbody>';
    d.categories.forEach(function(c){html+='<tr><td>'+c.name+'</td><td><button class="btn btn-d btn-sm" onclick="delCategory(\''+c.id+'\')">حذف</button></td></tr>'});
    html+='</tbody></table>';}
  mc.innerHTML=html;
}

async function addCategory(){
  var name=document.getElementById('newCatName').value.trim();
  if(!name){toast('أدخل اسم القسم');return}
  var r=await fetch(API+'/vendor/manage/categories',{method:'POST',headers:h(),body:JSON.stringify({name:name})});
  var d=await r.json();
  if(!r.ok){toast(d.error);return}
  toast('تم إضافة القسم');goPage('categories');
}

async function delCategory(id){
  if(!confirm('حذف هذا القسم؟'))return;
  await fetch(API+'/vendor/manage/categories/'+id,{method:'DELETE',headers:hf()});
  toast('تم الحذف');goPage('categories');
}

async function renderOrdersPage(mc){
  mc.innerHTML='<h1>الطلبات</h1><div class="empty">قريباً — الطلبات ستظهر هنا</div>';
}

function renderSettingsPage(mc){
  if(!V){mc.innerHTML='<div class="empty">لا يوجد متجر</div>';return}
  mc.innerHTML='<h1>إعدادات المتجر</h1>'+
    '<div class="form-g"><label>اسم المتجر</label><input id="sName" value="'+V.store_name+'" maxlength="100"></div>'+
    '<div class="form-g"><label>وصف المتجر</label><textarea id="sDesc" maxlength="500">'+(V.store_desc||'')+'</textarea></div>'+
    '<div class="form-row"><div class="form-g"><label>واتساب</label><input id="sWa" value="'+(V.whatsapp||'')+'" dir="ltr" style="text-align:right"></div><div class="form-g"><label>هاتف</label><input id="sPhone" value="'+(V.phone||'')+'" dir="ltr" style="text-align:right"></div></div>'+
    '<div class="form-row"><div class="form-g"><label>فيسبوك</label><input id="sFb" value="'+(V.social_facebook||'')+'"></div><div class="form-g"><label>انستغرام</label><input id="sIg" value="'+(V.social_instagram||'')+'"></div></div>'+
    '<div style="margin-top:8px"><button class="btn btn-p" onclick="saveSettings()">حفظ التعديلات</button></div>'+
    '<div style="margin-top:20px;padding:16px;background:#fff;border-radius:12px"><div style="font-weight:700;font-size:.85rem;margin-bottom:4px">رابط متجرك</div><a href="/store/'+V.store_slug+'" target="_blank" style="color:#A87E2C;font-weight:600">/store/'+V.store_slug+'</a></div>';
}

async function saveSettings(){
  var fd=new FormData();
  fd.append('store_name',document.getElementById('sName').value.trim());
  fd.append('store_desc',document.getElementById('sDesc').value.trim());
  fd.append('whatsapp',document.getElementById('sWa').value.trim());
  fd.append('phone',document.getElementById('sPhone').value.trim());
  fd.append('social_facebook',document.getElementById('sFb').value.trim());
  fd.append('social_instagram',document.getElementById('sIg').value.trim());
  var r=await fetch(API+'/vendor/store',{method:'PUT',headers:hf(),body:fd});
  if(r.ok){toast('تم الحفظ');loadDashboard()}else{var d=await r.json();toast(d.error)}
}

async function renderSubPage(mc){
  var r=await fetch(API+'/vendor/plans',{headers:hf()});var pd=await r.json();
  var html='<h1>الاشتراك</h1>';

  if(SUB){
    var dl=daysLeft(SUB.expires_at);
    html+='<div style="background:#fff;padding:20px;border-radius:12px;margin-bottom:20px">'+
      '<div style="font-weight:800;font-size:1rem;margin-bottom:8px">الباقة الحالية: '+SUB.plan_name+'</div>'+
      '<div style="font-size:.85rem;color:#6E665C">من '+fmtDate(SUB.starts_at)+' إلى '+fmtDate(SUB.expires_at)+'</div>'+
      '<div style="font-size:.85rem;color:#6E665C">متبقي: '+dl+' يوم</div>'+
      '<div class="progress-bar" style="margin-top:8px"><div class="progress-fill" style="width:'+Math.max(5,Math.round(dl/365*100))+'%"></div></div></div>';
  }

  // تفعيل بالرمز
  if(V&&V.status!=='active'){
    html+='<div style="background:#fff;padding:20px;border-radius:12px;margin-bottom:20px">'+
      '<div style="font-weight:800;margin-bottom:12px">تفعيل المتجر بالرمز</div>'+
      '<div style="display:flex;gap:8px"><input id="actCode" placeholder="ACT-XXXX-XXXX-XXXX" dir="ltr" style="flex:1;padding:10px;border:1.5px solid rgba(201,154,63,.12);border-radius:8px;outline:none;text-align:center;font-size:1rem;letter-spacing:2px" maxlength="20><button class="btn btn-p btn-sm" onclick="redeemCode()">تفعيل</button></div>'+
      '<div style="font-size:.78rem;color:#9E9589;margin-top:8px">لم تحصل على رمز التفعيل؟ تواصل مع الإدارة عبر واتساب بعد الدفع.</div></div>';
  }

  // الباقات
  html+='<div style="font-weight:800;margin-bottom:12px">الباقات المتاحة</div>';
  html+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px">';
  pd.plans.forEach(function(p){
    var isCurrent=SUB&&SUB.plan_id===p.id;
    html+='<div style="background:#fff;padding:20px;border-radius:12px;border:2px solid '+(isCurrent?'#C99A3F':'transparent')+';text-align:center">'+
      '<div style="font-weight:800;font-size:1rem;margin-bottom:4px">'+p.name_ar+'</div>'+
      '<div style="font-weight:800;font-size:1.3rem;color:#A87E2C;margin-bottom:8px">'+(p.price_iqd?fmtP(p.price_iqd):'مجاناً')+'</div>'+
      '<div style="font-size:.78rem;color:#6E665C;margin-bottom:4px">المنتجات: '+(p.max_products===-1?'غير محدودة':p.max_products)+'</div>'+
      '<div style="font-size:.78rem;color:#6E665C;margin-bottom:12px">الأقسام: '+(p.max_categories===-1?'غير محدودة':p.max_categories)+'</div>'+
      (p.is_verified?'<div style="font-size:.78rem;color:#065F46;font-weight:700;margin-bottom:8px">متجر موثّق</div>':'')+
      (isCurrent?'<div style="font-size:.82rem;font-weight:700;color:#C99A3F">الباقة الحالية</div>':
        '<button class="btn btn-p btn-sm" onclick="requestPlan(\''+p.id+'\')">اختيار</button>')+
      '</div>';
  });
  html+='</div>';
  mc.innerHTML=html;
}

async function requestPlan(planId){
  var r=await fetch(API+'/vendor/request-subscription',{method:'POST',headers:h(),body:JSON.stringify({plan_id:planId})});
  var d=await r.json();
  if(!r.ok){toast(d.error);return}
  if(d.subscription_id){toast('تم تفعيل الباقة المجانية!');loadDashboard();return}
  toast('تم إرسال الطلب — '+d.request_code);
  if(d.whatsapp_url)window.open(d.whatsapp_url,'_blank');
  goPage('subscription');
}

async function redeemCode(){
  var code=document.getElementById('actCode').value.trim();
  if(!code){toast('أدخل رمز التفعيل');return}
  var r=await fetch(API+'/vendor/redeem-code',{method:'POST',headers:h(),body:JSON.stringify({code:code})});
  var d=await r.json();
  if(!r.ok){toast(d.error);return}
  toast('تم تفعيل متجرك بنجاح!');loadDashboard();
}

loadDashboard();
</script></body></html>
